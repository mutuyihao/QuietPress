name: Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 1"

permissions:
  contents: read

jobs:
  pnpm-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level high
