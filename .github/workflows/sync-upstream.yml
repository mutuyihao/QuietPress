name: Sync upstream

on:
  workflow_dispatch:
    inputs:
      upstream_repository:
        description: Canonical upstream repository URL.
        required: true
        default: https://github.com/mutuyihao/blog.git
      upstream_branch:
        description: Upstream branch to fetch.
        required: true
        default: main
      target_branch:
        description: Branch in this repository that Vercel tracks.
        required: true
        default: main
      dry_run:
        description: Check whether the branch can fast-forward without pushing.
        required: true
        type: boolean
        default: false
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.event.inputs.target_branch || 'main' }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.repository != 'mutuyihao/blog'
    runs-on: ubuntu-latest

    env:
      UPSTREAM_REPOSITORY: ${{ github.event.inputs.upstream_repository || 'https://github.com/mutuyihao/blog.git' }}
      UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'main' }}
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'main' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || 'main' }}
          fetch-depth: 0
          persist-credentials: true

      - name: Fast-forward from upstream
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$UPSTREAM_REPOSITORY"
          git fetch upstream "$UPSTREAM_BRANCH"

          current_sha="$(git rev-parse HEAD)"
          upstream_sha="$(git rev-parse "upstream/$UPSTREAM_BRANCH")"

          if [ "$current_sha" = "$upstream_sha" ]; then
            echo "Already up to date at $current_sha."
            exit 0
          fi

          if ! git merge-base --is-ancestor HEAD "upstream/$UPSTREAM_BRANCH"; then
            echo "::error::Target branch cannot fast-forward to upstream/$UPSTREAM_BRANCH. Reconcile local changes manually, then rerun this workflow."
            exit 1
          fi

          echo "Fast-forwarding $TARGET_BRANCH from $current_sha to $upstream_sha."
          git merge --ff-only "upstream/$UPSTREAM_BRANCH"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled; not pushing."
            exit 0
          fi

          git push origin "HEAD:$TARGET_BRANCH"
